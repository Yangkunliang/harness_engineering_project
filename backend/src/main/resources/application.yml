server:
  port: 8080

spring:
  application:
    name: harness-admin
  datasource:
    url: jdbc:mysql://localhost:3306/harness_admin?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: harness-engineering-admin-secret-key-2024
  expiration: 86400000

admin:
  init:
    username: admin
    password: Admin@123456
    role: SUPER_ADMIN
